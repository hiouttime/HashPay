name: Update HashPay

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-hashpay
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout instance repository
        uses: actions/checkout@v4

      - name: Sync from upstream
        shell: bash
        run: |
          set -euo pipefail

          if [ -f wrangler.jsonc ]; then
            cp wrangler.jsonc "$RUNNER_TEMP/wrangler.current.jsonc"
          fi

          git fetch https://github.com/TGDash/HashPay.git main --depth=1
          git reset --hard FETCH_HEAD

          if [ -f "$RUNNER_TEMP/wrangler.current.jsonc" ]; then
            node scripts/merge-wrangler.mjs "$RUNNER_TEMP/wrangler.current.jsonc" wrangler.jsonc
          fi

          git config user.name "HashPay Updater"
          git config user.email "actions@github.com"

          if git diff --quiet; then
            echo "HashPay is already up to date."
          else
            git add -A
            git commit -m "Update HashPay from upstream"
          fi

          git push --force-with-lease origin "HEAD:${GITHUB_REF_NAME}"
