<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashPay 配置</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "SF Pro Display", "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif;
            background: radial-gradient(circle at 10% 20%, rgba(51, 144, 236, 0.08), transparent 25%),
                        radial-gradient(circle at 90% 0%, rgba(255, 163, 102, 0.08), transparent 20%),
                        var(--tg-theme-bg-color, #f7f9fc);
            color: var(--tg-theme-text-color, #0f172a);
            padding: 24px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto 32px;
        }
        
        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: var(--tg-theme-text-color, #0f172a);
        }
        
        .section {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
        }
        
        .section h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #0f172a);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #3390ec);
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
        }
        
        .radio-item input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--tg-theme-button-color, #3390ec), #2b7bc4);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(51, 144, 236, 0.25);
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden {
            display: none;
        }
        
        .status {
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 16px;
            text-align: center;
            border: 1px solid transparent;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
            border-color: rgba(21, 87, 36, 0.12);
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border-color: rgba(114, 28, 36, 0.12);
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border-color: rgba(12, 84, 96, 0.12);
        }
        
        #loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--tg-theme-button-color, #3390ec);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hero {
            background: var(--tg-theme-secondary-bg-color, #ffffff);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 18px;
            border: 1px solid rgba(15, 23, 42, 0.06);
            box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(51, 144, 236, 0.1);
            color: #1f487c;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2px;
            margin-bottom: 10px;
        }

        .hero p {
            color: var(--tg-theme-hint-color, #4b5563);
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .inline-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: rgba(52, 199, 89, 0.12);
            color: #14532d;
            border-radius: 12px;
            font-weight: 600;
            border: 1px solid rgba(52, 199, 89, 0.2);
        }

        .inline-status.warning {
            background: rgba(245, 158, 11, 0.14);
            color: #8a5212;
            border-color: rgba(245, 158, 11, 0.25);
        }

        .inline-status.error {
            background: rgba(239, 68, 68, 0.12);
            color: #7f1d1d;
            border-color: rgba(239, 68, 68, 0.22);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: currentColor;
            position: relative;
        }

        .dot.live::after {
            content: "";
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid currentColor;
            opacity: 0.6;
            animation: pulse 1.8s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 0.6; }
            50% { transform: scale(1.1); opacity: 0.2; }
            100% { transform: scale(1.2); opacity: 0; }
        }

        .tips-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
            margin-bottom: 18px;
        }

        .tip-card {
            padding: 12px;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.03);
            border: 1px dashed rgba(15, 23, 42, 0.08);
            color: var(--tg-theme-hint-color, #4b5563);
            line-height: 1.45;
        }

        .tip-card strong {
            color: var(--tg-theme-text-color, #0f172a);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>正在连接初始化服务...</p>
        </div>
        
        <div id="app" class="hidden">
            <div class="hero">
                <div class="chip">初始化进行中</div>
                <h1>完成 HashPay 启动配置</h1>
                <p>机器人验证已通过，请填写配置并提交。提交后后台会自动重启加载。</p>
                <div id="inline-status" class="inline-status">
                    <span class="dot live"></span>
                    <span id="inline-status-text">正在等待配置提交</span>
                </div>
            </div>
            
            <div id="status-message" class="status hidden"></div>

            <div class="tips-grid">
                <div class="tip-card"><strong>数据库</strong> 用于存储订单、用户等数据，若暂不确定，可先用 SQLite 后续再迁移。</div>
                <div class="tip-card"><strong>提交即可生效</strong> 表单提交成功后，服务会重新加载并使用新配置。</div>
            </div>
            
            <form id="config-form">
                <div class="section">
                    <h2>数据库配置</h2>
                    
                    <div class="form-group">
                        <label>数据库类型</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="db-sqlite" name="db-type" value="sqlite" checked>
                                <label for="db-sqlite">SQLite (推荐)</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="db-mysql" name="db-type" value="mysql">
                                <label for="db-mysql">MySQL</label>
                            </div>
                        </div>
                    </div>
                    
                    <div id="mysql-config" class="hidden">
                        <div class="form-group">
                            <label for="mysql-host">主机地址</label>
                            <input type="text" id="mysql-host" placeholder="localhost" value="localhost">
                        </div>
                        <div class="form-group">
                            <label for="mysql-port">端口</label>
                            <input type="number" id="mysql-port" placeholder="3306" value="3306">
                        </div>
                        <div class="form-group">
                            <label for="mysql-database">数据库名</label>
                            <input type="text" id="mysql-database" placeholder="hashpay">
                        </div>
                        <div class="form-group">
                            <label for="mysql-username">用户名</label>
                            <input type="text" id="mysql-username" placeholder="root">
                        </div>
                        <div class="form-group">
                            <label for="mysql-password">密码</label>
                            <input type="password" id="mysql-password" placeholder="密码">
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>系统配置</h2>
                    
                    <div class="form-group">
                        <label for="currency">基础货币</label>
                        <select id="currency">
                            <option value="CNY" selected>CNY - 人民币</option>
                            <option value="USD">USD - 美元</option>
                            <option value="EUR">EUR - 欧元</option>
                            <option value="GBP">GBP - 英镑</option>
                            <option value="TWD">TWD - 新台币</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="timeout">订单超时时间（秒）</label>
                        <input type="number" id="timeout" value="1800" min="300" max="7200">
                    </div>
                    
                    <div class="form-group">
                        <label for="rate-adjust">汇率调整（%）</label>
                        <input type="number" id="rate-adjust" value="0" step="0.01" min="-10" max="10">
                    </div>
                    
                    <div class="form-group">
                        <div class="radio-item">
                            <input type="checkbox" id="fast-confirm" checked>
                            <label for="fast-confirm">启用快速确认</label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" id="submit-btn">完成配置</button>
            </form>
        </div>
    </div>
    
    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let isInitMode = false;

        function getApiUrl() {
            if (window.location.hostname === 'testapp.timetl.com') {
                return 'http://localhost:8080';
            }
            return window.location.origin;
        }

        const apiBaseUrl = getApiUrl();
        const loadingEl = document.getElementById('loading');
        const appEl = document.getElementById('app');
        const statusMessageEl = document.getElementById('status-message');
        const inlineStatusEl = document.getElementById('inline-status');
        const inlineStatusTextEl = document.getElementById('inline-status-text');
        const submitBtn = document.getElementById('submit-btn');
        const configForm = document.getElementById('config-form');
        const mysqlConfig = document.getElementById('mysql-config');
        
        async function init() {
            try {
                const response = await fetch(`${apiBaseUrl}/api/status`);
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                if (data.status === 'init') {
                    isInitMode = true;
                    console.log('初始化模式，管理员ID:', data.admin_id);
                    updateInlineStatus('正在等待配置提交', 'success');
                } else {
                    showMessage('当前为管理模式（功能开发中）', 'info');
                    updateInlineStatus('当前不是初始化模式', 'warning');
                }
            } catch (error) {
                console.error('初始化检测失败:', error);
                showMessage('无法连接初始化服务，请稍后重试', 'error');
                updateInlineStatus('连接失败，请稍后重试', 'error');
            }
            
            loadingEl.classList.add('hidden');
            appEl.classList.remove('hidden');
        }
        
        // 数据库类型切换
        document.querySelectorAll('input[name="db-type"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                if (e.target.value === 'mysql') {
                    mysqlConfig.classList.remove('hidden');
                } else {
                    mysqlConfig.classList.add('hidden');
                }
            });
        });
        
        // 显示消息
        function showMessage(message, type = 'info') {
            statusMessageEl.textContent = message;
            statusMessageEl.className = `status ${type}`;
            statusMessageEl.classList.remove('hidden');
            
            if (type !== 'error') {
                setTimeout(() => {
                    statusMessageEl.classList.add('hidden');
                }, 3000);
            }
        }

        function updateInlineStatus(text, type = 'success') {
            inlineStatusTextEl.textContent = text;
            inlineStatusEl.className = 'inline-status';
            if (type && type !== 'success') {
                inlineStatusEl.classList.add(type);
            }
        }
        
        // 提交配置
        configForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!isInitMode) {
                showMessage('当前不是初始化模式', 'error');
                updateInlineStatus('当前不是初始化模式', 'warning');
                return;
            }
            
            const dbType = document.querySelector('input[name="db-type"]:checked').value;
            const timeout = Number.parseInt(document.getElementById('timeout').value, 10) || 0;
            const rateAdjust = Number.parseFloat(document.getElementById('rate-adjust').value) || 0;
            const config = {
                database: {
                    type: dbType
                },
                system: {
                    currency: document.getElementById('currency').value,
                    timeout,
                    fast_confirm: document.getElementById('fast-confirm').checked,
                    rate_adjust: rateAdjust
                }
            };
            
            if (dbType === 'mysql') {
                config.database.mysql = {
                    host: document.getElementById('mysql-host').value.trim(),
                    port: Number.parseInt(document.getElementById('mysql-port').value, 10) || 3306,
                    database: document.getElementById('mysql-database').value.trim(),
                    username: document.getElementById('mysql-username').value.trim(),
                    password: document.getElementById('mysql-password').value
                };
            }
            
            try {
                submitBtn.disabled = true;
                submitBtn.textContent = '正在提交...';

                const response = await fetch(`${apiBaseUrl}/api/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                if (!response.ok) {
                    const detail = await response.text();
                    throw new Error(detail || '配置提交失败');
                }

                showMessage('配置成功！系统正在初始化...', 'success');
                updateInlineStatus('配置已提交，系统即将重启', 'success');
                setTimeout(() => {
                    tg.close();
                }, 2000);
            } catch (error) {
                console.error('Error:', error);
                showMessage('配置失败：' + error.message, 'error');
                updateInlineStatus('配置提交失败，请检查网络或参数', 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '完成配置';
            }
        });
        
        // 初始化应用
        init();
    </script>
</body>
</html>
