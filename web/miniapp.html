<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HashPay 配置</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .section {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }
        
        .section h2 {
            font-size: 18px;
            margin-bottom: 12px;
            color: var(--tg-theme-text-color, #000000);
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: var(--tg-theme-hint-color, #999999);
        }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 8px;
            font-size: 16px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
        }
        
        input:focus, select:focus {
            outline: none;
            border-color: var(--tg-theme-button-color, #3390ec);
        }
        
        .radio-group {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
        }
        
        .radio-item {
            display: flex;
            align-items: center;
        }
        
        .radio-item input[type="radio"] {
            width: auto;
            margin-right: 8px;
        }
        
        button {
            width: 100%;
            padding: 14px;
            background: var(--tg-theme-button-color, #3390ec);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        button:hover {
            opacity: 0.9;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .hidden {
            display: none;
        }
        
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
            text-align: center;
        }
        
        .status.success {
            background: #d4edda;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }
        
        #loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            border: 3px solid rgba(0,0,0,0.1);
            border-radius: 50%;
            border-top: 3px solid var(--tg-theme-button-color, #3390ec);
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>正在加载...</p>
        </div>
        
        <div id="app" class="hidden">
            <h1>HashPay 初始化配置</h1>
            
            <div id="status-message" class="status hidden"></div>
            
            <form id="config-form">
                <div class="section">
                    <h2>数据库配置</h2>
                    
                    <div class="form-group">
                        <label>数据库类型</label>
                        <div class="radio-group">
                            <div class="radio-item">
                                <input type="radio" id="db-sqlite" name="db-type" value="sqlite" checked>
                                <label for="db-sqlite">SQLite (推荐)</label>
                            </div>
                            <div class="radio-item">
                                <input type="radio" id="db-mysql" name="db-type" value="mysql">
                                <label for="db-mysql">MySQL</label>
                            </div>
                        </div>
                    </div>
                    
                    <div id="mysql-config" class="hidden">
                        <div class="form-group">
                            <label for="mysql-host">主机地址</label>
                            <input type="text" id="mysql-host" placeholder="localhost" value="localhost">
                        </div>
                        <div class="form-group">
                            <label for="mysql-port">端口</label>
                            <input type="number" id="mysql-port" placeholder="3306" value="3306">
                        </div>
                        <div class="form-group">
                            <label for="mysql-database">数据库名</label>
                            <input type="text" id="mysql-database" placeholder="hashpay">
                        </div>
                        <div class="form-group">
                            <label for="mysql-username">用户名</label>
                            <input type="text" id="mysql-username" placeholder="root">
                        </div>
                        <div class="form-group">
                            <label for="mysql-password">密码</label>
                            <input type="password" id="mysql-password" placeholder="密码">
                        </div>
                    </div>
                </div>
                
                <div class="section">
                    <h2>系统配置</h2>
                    
                    <div class="form-group">
                        <label for="currency">基础货币</label>
                        <select id="currency">
                            <option value="CNY" selected>CNY - 人民币</option>
                            <option value="USD">USD - 美元</option>
                            <option value="EUR">EUR - 欧元</option>
                            <option value="GBP">GBP - 英镑</option>
                            <option value="TWD">TWD - 新台币</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="timeout">订单超时时间（秒）</label>
                        <input type="number" id="timeout" value="1800" min="300" max="7200">
                    </div>
                    
                    <div class="form-group">
                        <label for="rate-adjust">汇率调整（%）</label>
                        <input type="number" id="rate-adjust" value="0" step="0.01" min="-10" max="10">
                    </div>
                    
                    <div class="form-group">
                        <div class="radio-item">
                            <input type="checkbox" id="fast-confirm" checked>
                            <label for="fast-confirm">启用快速确认</label>
                        </div>
                    </div>
                </div>
                
                <button type="submit" id="submit-btn">完成配置</button>
            </form>
        </div>
    </div>
    
    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
        
        // 检查是否是初始化模式
        let isInitMode = false;
        let apiBaseUrl = '';
        
        // 获取API基础URL
        function getApiUrl() {
            // 开发环境
            if (window.location.hostname === 'testapp.timetl.com') {
                return 'http://localhost:8080';
            }
            // 生产环境
            return window.location.origin;
        }
        
        apiBaseUrl = getApiUrl();
        
        // 初始化
        async function init() {
            try {
                // 检查是否是初始化模式
                const response = await fetch(`${apiBaseUrl}/api/init/health`);
                if (response.ok) {
                    const data = await response.json();
                    if (data.status === 'ready') {
                        isInitMode = true;
                        console.log('初始化模式，管理员ID:', data.admin_id);
                    }
                }
            } catch (error) {
                console.log('不是初始化模式，显示正常管理界面');
                // TODO: 显示正常的管理界面
                showMessage('当前为管理模式（功能开发中）', 'info');
            }
            
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }
        
        // 数据库类型切换
        document.querySelectorAll('input[name="db-type"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                const mysqlConfig = document.getElementById('mysql-config');
                if (e.target.value === 'mysql') {
                    mysqlConfig.classList.remove('hidden');
                } else {
                    mysqlConfig.classList.add('hidden');
                }
            });
        });
        
        // 显示消息
        function showMessage(message, type = 'info') {
            const statusDiv = document.getElementById('status-message');
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
            statusDiv.classList.remove('hidden');
            
            if (type !== 'error') {
                setTimeout(() => {
                    statusDiv.classList.add('hidden');
                }, 3000);
            }
        }
        
        // 提交配置
        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!isInitMode) {
                showMessage('当前不是初始化模式', 'error');
                return;
            }
            
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.textContent = '正在提交...';
            
            const dbType = document.querySelector('input[name="db-type"]:checked').value;
            const config = {
                database: {
                    type: dbType
                },
                system: {
                    currency: document.getElementById('currency').value,
                    timeout: parseInt(document.getElementById('timeout').value),
                    fast_confirm: document.getElementById('fast-confirm').checked,
                    rate_adjust: parseFloat(document.getElementById('rate-adjust').value)
                }
            };
            
            if (dbType === 'mysql') {
                config.database.mysql = {
                    host: document.getElementById('mysql-host').value,
                    port: parseInt(document.getElementById('mysql-port').value),
                    database: document.getElementById('mysql-database').value,
                    username: document.getElementById('mysql-username').value,
                    password: document.getElementById('mysql-password').value
                };
            }
            
            try {
                const response = await fetch(`${apiBaseUrl}/api/init/config`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(config)
                });
                
                if (response.ok) {
                    showMessage('配置成功！系统正在初始化...', 'success');
                    setTimeout(() => {
                        tg.close();
                    }, 2000);
                } else {
                    throw new Error('配置提交失败');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('配置失败：' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.textContent = '完成配置';
            }
        });
        
        // 初始化应用
        init();
    </script>
</body>
</html>
